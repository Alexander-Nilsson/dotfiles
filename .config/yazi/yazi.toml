[manager]
ratio          = [1, 2, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true

[preview]
tab_size   = 2
max_width  = 1920
max_height = 1080
cache_dir  = ""

image_quality     = 75
sixel_fraction    = 15
image_filter      = "triangle"

[opener]
edit = [
    { run = 'vim "$@"', desc = "vim", block = true },
]
open = [
    { run = 'xdg-open "$@"', desc = "Open" },
]

[open]
rules = [
    { mime = "text/*",        use = "edit" },
    { mime = "image/*",       use = "open" },
    { mime = "video/*",       use = "open" },
    { mime = "application/pdf", use = "open" },
    { mime = "*",             use = "open" },
]
