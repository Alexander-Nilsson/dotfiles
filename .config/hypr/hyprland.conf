###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin 
$menu = wofi --show drun
$browser = zen-browser


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = swaync
exec-once = clipse -listen # run listener on startup
# exec-once = hyprsunset
exec-once = hyprshade auto 
# exec-once = hyprlock
exec-once = ~/.cargo/bin/aw-watcher-window-hyprland &

windowrule = float on, match:class ^(clipse)$
windowrule = size 622 652, match:class ^(clipse)$

#ZH keyboard, ctrl shift f to switch between traditional and simplified chinese
windowrule = pseudo on, match:class ^(fcitx)$

exec-once = fcitx5 -d --replace

#waybar tooogle workspace 5
# exec-once = ~/.config/hypr/scripts/togglewaybar.sh 5

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_MENU_PREFIX,arch-

# dolphin fix?
env = XDG_MENU_PREFIX,arch-

#####################
### LOOK AND FEEL ###
#####################
# Refer to https://wiki.hyprland.org/Configuring/Variables/
# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]


# Zen-browser Picture-in-Picture
windowrule = float on, no_initial_focus on, pin on, move 1438 809, size 480 270, match:class ^(zen)$ && match:title ^(Picture-in-Picture)$

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


########
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us 
    # kb_variant = nodeadkeys
    kb_options =
    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

##############################
### WINDOWS AND WORKSPACES ###
##############################
# Ignore maximize requests from apps
windowrule = suppress_event maximize, match:class .*

# Fix dragging issues with XWayland (non-fullscreen, unpinned, empty class/title)
windowrule = no_focus on, match:xwayland true && match:floating true && match:fullscreen false && match:pinned false && match:class ^$ && match:title ^$

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier
$wall_1 = hyprctl hyprpaper wallpaper " ,~/.config/backgrounds/aesthetic_deer.jpg"
$wall_2 = hyprctl hyprpaper wallpaper " ,~/.config/backgrounds/deer_and_sunset.jpg"
$wall_3 = hyprctl hyprpaper wallpaper " ,~/.config/backgrounds/deer_in_pine_forest.jpg"
$wall_4 = hyprctl hyprpaper wallpaper " ,~/.config/backgrounds/highlands-grid.jpg"
# TODO update this to be alt end and toogle hyprshade
bind = ALT,1, exec, hyprshade off

#bind to toogle nilanguage
# bind = CTRL, SPACE, exec, fcitx5-remote -t

bindt = CTRL, SPACE, exec, fcitx5-remote -t

# Screenshot a window
bind = $mainMod, PRINT, exec, hyprshot -m window
# Screenshot a monitor
bind = , PRINT, exec, hyprshot -m output
# Screenshot a region
bind = $shiftMod, PRINT, exec, hyprshot -m region

bind = SUPER, V, exec, ~/.config/hypr/scripts/toggle_clipse.sh 

bind = SUPER, W, exec, killall -SIGUSR1 waybar
# bind = SUPER SHIFT, F, exec, ~/.config/hypr/scripts/togglewaybar.sddh

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# bind = $mainMod, Q, exec, $terminal
bind = CTRL ALT, T, exec, $terminal

bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, D, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = ALT, SPACE, exec, ~/.config/hypr/scripts/toggle_menu.sh
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod shift, L, exec, hyprlock
# bind = $mainMod, J, togglesplit, 

# binds for opening programs in specific workspaces
# Zen Browser (fix: zen-bin)
bind = $mainMod, B, exec, zen-browser  #bash -c 'pgrep zen-bin && hyprctl dispatch workspace 1 || zen-browser'
bind = $mainMod shift, B, exec, brave  #bash -c 'pgrep zen-bin && hyprctl dispatch workspace 1 || zen-browser'
# Obsidian (fix: use -f flag to match command line)
# bind = $mainMod, O, exec, bash -c 'pgrep -f obsidian && hyprctl dispatch workspace 2 || obsidian'

# Switch to the next workspace (right)
bind = $mainMod, right, workspace, e+1
bind = $mainMod, l, workspace, e+1
# Switch to the previous workspace (left)
bind = $mainMod, left, workspace, e-1
bind = $mainMod, h, workspace, e-1

bind = super, O, exec, obsidian

# Binds for paste nth item 
# JUST moves to clipboard 
# need to do ctrl v to paste
bind = CTRL, 1, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 0 #| ydotool key ctrl+v
bind = CTRL, 2, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 1 #| xdotool key ctrl+v
bind = CTRL, 3, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 2 #| xdotool key ctrl+v
bind = CTRL, 4, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 3 #| xdotool key ctrl+v
bind = CTRL, 5, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 4 #| xdotool key ctrl+v
bind = CTRL, 6, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 5 #| xdotool key ctrl+v
bind = CTRL, 7, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 6 #| xdotool key ctrl+v
bind = CTRL, 8, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 7 #| xdotool key ctrl+v
bind = CTRL, 9, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 8 #| xdotool key ctrl+v

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# vim KEYBINDINGS
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, d

#binds for changing backgrounds
bind = $mainMod, 1, exec, $wall_1
bind = $mainMod, 2, exec, $wall_2
bind = $mainMod, 3, exec, $wall_3 
bind = $mainMod, 4, exec, $wall_4

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

#todo paste copied item n 
