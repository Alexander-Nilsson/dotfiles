################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = kitty -e yazi 
$menu = rofi --show drun
$browser = zen-browser

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = swww-daemon                                        # replaces hyprpaper
exec-once = ~/.config/hypr/scripts/wallpaper-restore.sh       # restore last wallpaper + matugen colors on login
exec-once = hypridle
exec-once = swaync
exec-once = clipse -listen
exec-once = hyprshade auto
exec-once = ~/.cargo/bin/aw-watcher-window-hyprland &
exec-once = fcitx5 -d --replace

windowrule = float on, match:class ^(clipse)$
windowrule = size 622 652, match:class ^(clipse)$

# ZH keyboard, ctrl shift f to switch between traditional and simplified chinese
windowrule = pseudo on, match:class ^(fcitx)$

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = HYPRCURSOR_SIZE,24
env = XDG_MENU_PREFIX,arch-

#####################
### LOOK AND FEEL ###
#####################

# Load matugen-generated colors
source = ~/.config/hypr/colors.conf

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2

    # Uses matugen variables — updated on each wallpaper change
    col.active_border = $primary $secondary 45deg
    col.inactive_border = $surface

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_options =
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Zen-browser Picture-in-Picture
windowrule = float on, no_initial_focus on, pin on, move 1438 809, size 480 270, match:class ^(zen)$ && match:title ^(Picture-in-Picture)$

# Fix dragging issues with XWayland
windowrule = no_focus on, match:xwayland true && match:floating true && match:fullscreen false && match:pinned false && match:class ^$ && match:title ^$

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# --- Application launchers ---
bind = CTRL ALT, T, exec, $terminal
bind = $mainMod, D, exec, $fileManager
bind = $mainMod, B, exec, zen-browser
bind = $mainMod SHIFT, B, exec, brave
bind = super, O, exec, obsidian
bind = ALT, SPACE, exec, ~/.config/hypr/scripts/toggle_menu.sh

# --- Window management ---
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, F, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod SHIFT, L, exec, hyprlock

# --- Wallpaper picker (replaces old hyprpaper wall_1-4 binds) ---
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper-picker.sh

# --- Waybar toggle ---
bind = $mainMod SHIFT, W, exec, killall -SIGUSR1 waybar

# --- Hyprshade ---
bind = ALT, 1, exec, hyprshade off

# --- Fcitx5 toggle ---
bindt = CTRL, SPACE, exec, fcitx5-remote -t

# --- Screenshots ---
bind = $mainMod, PRINT, exec, hyprshot -m window
bind = , PRINT, exec, hyprshot -m output
bind = $shiftMod, PRINT, exec, hyprshot -m region

# --- Clipboard (clipse) ---
bind = SUPER, V, exec, ~/.config/hypr/scripts/toggle_clipse.sh

# --- Paste nth clipboard item ---
bind = CTRL, 1, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 0
bind = CTRL, 2, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 1
bind = CTRL, 3, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 2
bind = CTRL, 4, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 3
bind = CTRL, 5, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 4
bind = CTRL, 6, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 5
bind = CTRL, 7, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 6
bind = CTRL, 8, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 7
bind = CTRL, 9, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 8

# --- Focus (vim-style) ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, d

# --- Workspace navigation ---
bind = $mainMod, right, workspace, e+1
bind = $mainMod, left, workspace, e-1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --- Switch workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Move window to workspace ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Move/resize with mouse ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Media & brightness ---
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

debug {
    disable_logs = false
    enable_stdout_logs = true
}
