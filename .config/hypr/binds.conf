###################
### KEYBINDINGS ###
###################

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun
$browser = zen-browser

$wall_1 = hyprctl hyprpaper wallpaper " ,~/.config/backgrounds/aesthetic_deer.jpg"
$wall_2 = hyprctl hyprpaper wallpaper " ,~/.config/backgrounds/deer_and_sunset.jpg"
$wall_3 = hyprctl hyprpaper wallpaper " ,~/.config/backgrounds/deer_in_pine_forest.jpg"
$wall_4 = hyprctl hyprpaper wallpaper " ,~/.config/backgrounds/highlands-grid.jpg"

#bind to toogle language
bind = SUPER, SPACE, exec, fcitx5-remote -t

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Screenshot a window
bind = $mainMod, PRINT, exec, hyprshot -m window
# Screenshot a monitor
bind = , PRINT, exec, hyprshot -m output
# Screenshot a region
bind = $shiftMod, PRINT, exec, hyprshot -m region

bind = SUPER, V, exec, ~/.config/hypr/scripts/toggle_clipse.sh 


# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = CTRL ALT, T, exec, $terminal

bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = ALT, SPACE, exec, ~/.config/hypr/scripts/toggle_menu.sh
bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, togglesplit, 

bind = $mainMod, B, exec, $browser
bind = $mainMod, O, exec, obsidian

bind = $mainMod, L, exec, hyprlock
bind = $mainMod, A, exec, anki



# Binds for paste nth item 
# JUST moves to clipboard 
# need to do ctrl v to paste
bind = CTRL, 1, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 0 #| ydotool key ctrl+v
bind = CTRL, 2, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 1 #| xdotool key ctrl+v
bind = CTRL, 3, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 2 #| xdotool key ctrl+v
bind = CTRL, 4, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 3 #| xdotool key ctrl+v
bind = CTRL, 5, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 4 #| xdotool key ctrl+v
bind = CTRL, 6, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 5 #| xdotool key ctrl+v
bind = CTRL, 7, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 6 #| xdotool key ctrl+v
bind = CTRL, 8, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 7 #| xdotool key ctrl+v
bind = CTRL, 9, exec, ~/.dotfiles/.config/hypr/scripts/paste_nth_clipboard_item.sh 8 #| xdotool key ctrl+v

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# vim KEYBINDINGS
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, d

#binds for changing backgrounds
bind = $mainMod, 1, exec, $wall_1
bind = $mainMod, 2, exec, $wall_2
bind = $mainMod, 3, exec, $wall_3 
bind = $mainMod, 4, exec, $wall_4

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

#todo paste copied item n 
#bind = CTRL, 1, exec, ~/.config/hypr/scripts/paste_nth_clipboard_item.sh 1
#bind = CTRL, 2, exec, ~/.config/hypr/scripts/paste_nth_clipboard_item.sh 2
#bind = CTRL, 3, exec, ~/.config/hypr/scripts/paste_nth_clipboard_item.sh 3
#bind = CTRL, 4, exec, ~/.config/hypr/scripts/paste_nth_clipboard_item.sh 4
#bind = CTRL, 5, exec, ~/.config/hypr/scripts/paste_nth_clipboard_item.sh 5
#bind = CTRL, 6, exec, ~/.config/hypr/scripts/paste_nth_clipboard_item.sh 6
#bind = CTRL, 7, exec, ~/.config/hypr/scripts/paste_nth_clipboard_item.sh 7
#bind = CTRL, 8, exec, ~/.config/hypr/scripts/paste_nth_clipboard_item.sh 8
#bind = CTRL, 9, exec, ~/.config/hypr/scripts/paste_nth_clipboard_item.sh 9


# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = SHIFT, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
