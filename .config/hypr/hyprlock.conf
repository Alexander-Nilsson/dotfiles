source = $HOME/.config/hypr/colors.conf

$font = JetBrainsMono Nerd Font

# GENERAL
general {
    disable_loading_bar = true
    hide_cursor = true
    ignore_empty_input = true
}

# BACKGROUND
background {
    monitor =
    blur_passes = 4
    blur_size = 8
    brightness = 0.6
    contrast = 0.9
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# TIME
label {
    monitor =
    text = cmd[update:30000] echo "$(date +"%R")"
    color = rgb($primary_hex)
    font_size = 90
    font_family = $font
    position = -30, 0
    halign = right
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = rgb($on_background_hex)
    font_size = 25
    font_family = $font
    position = -30, -150
    halign = right
    valign = top
}

# USER AVATAR
image {
    monitor =
    path = ~/.face
    size = 100
    border_color = rgb($primary_hex)
    position = 0, 75
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb($primary_hex)
    inner_color = rgb($surface_hex)
    font_color = rgb($on_background_hex)
    fade_on_empty = false
    hide_input = false
    check_color = rgb($secondary_hex)
    fail_color = rgb($error_hex)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb($tertiary_hex)
    position = 0, -35
    halign = center
    valign = center
}
